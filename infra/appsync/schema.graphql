# ─────────────────────────────────────────────────
# Kasi Food Delivery — AppSync GraphQL Schema
# ─────────────────────────────────────────────────

# ── Scalars ──────────────────────────────────────
scalar AWSDateTime
scalar AWSJSON

# ── Enums ────────────────────────────────────────
enum Role {
  CUSTOMER
  VENDOR
  ADMIN
  SUPER_ADMIN
  DEV
}

enum VendorStatus {
  PENDING
  APPROVED
  REJECTED
  SUSPENDED
}

enum DeliveryType {
  PERCENTAGE
  FLAT
}

enum DeliveryMethod {
  PICKUP
  DELIVERY
}

# Who fulfils delivery for an order/vendor today. THIRD_PARTY is a data-model
# seam for a future courier-partner integration — no live integration exists yet.
enum DeliveryProvider {
  SELF_MANAGED
  THIRD_PARTY
}

enum OrderStatus {
  PENDING
  ACCEPTED
  PREPARING
  READY
  OUT_FOR_DELIVERY
  COMPLETED
  CANCELLED
}

enum PaymentMethod {
  DIGITAL
  CASH_ON_DELIVERY
  CASH_ON_PICKUP
  EFT
  PAYMENT_LINK
}

enum PaymentProvider {
  PAYFAST
  OZOW
}

enum PaymentProofStatus {
  PENDING_REVIEW
  VERIFIED
  FLAGGED
}

enum InventoryStatus {
  ACTIVE
  INACTIVE
}

enum OrderSource {
  WEB
  WHATSAPP
  MANUAL
}

# ── Types ─────────────────────────────────────────

type User {
  id: ID!
  name: String
  phone: String!
  email: String
  role: Role!
  isGuest: Boolean!
  createdAt: AWSDateTime!
}

type GuestDetails {
  name: String!
  phone: String!
}

type Location {
  lat: Float!
  lng: Float!
}

type WorkingHours {
  monday: String
  tuesday: String
  wednesday: String
  thursday: String
  friday: String
  saturday: String
  sunday: String
}

type BankDetails {
  bankName: String!
  accountNumber: String!
  accountHolder: String!
  branchCode: String!
}

type Vendor {
  id: ID!
  ownerId: ID!
  name: String!
  address: String!
  location: Location
  contactDetails: String
  workingHours: AWSJSON
  status: VendorStatus!
  deliveryType: DeliveryType
  deliveryValue: Float
  deliveryProvider: DeliveryProvider
  hasBankAccount: Boolean!
  # Digital payment (PayFast/Ozow) only shows up at checkout when a vendor has
  # explicitly opted in — most vendors onboarded today are cash/EFT-on-collection.
  digitalPaymentsEnabled: Boolean
  whatsappNumber: String
  refPrefix: String
  imageUrl: String
  description: String
  rating: Float
  totalReviews: Int
  createdAt: AWSDateTime!
}

type MenuItem {
  id: ID!
  vendorId: ID!
  name: String!
  description: String
  price: Float!
  imageUrl: String
  available: Boolean!
  category: String
  createdAt: AWSDateTime!
}

type OrderItem {
  id: ID!
  orderId: ID!
  menuItemId: ID!
  name: String!
  price: Float!
  quantity: Int!
}

type Order {
  id: ID!
  orderNumber: String!
  paymentRef: String!
  customerId: ID
  guestDetails: GuestDetails
  vendorId: ID!
  vendor: Vendor
  status: OrderStatus!
  deliveryMethod: DeliveryMethod!
  deliveryFee: Float
  deliveryProvider: DeliveryProvider
  courierName: String
  courierTrackingUrl: String
  courierExternalId: String
  subtotal: Float!
  totalAmount: Float!
  paymentMethod: PaymentMethod!
  paymentStatus: String
  paymentProvider: PaymentProvider
  paymentGatewayRef: String
  contactPhone: String!
  specialInstructions: String
  source: OrderSource
  items: [OrderItem!]
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Review {
  id: ID!
  vendorId: ID!
  userId: ID
  guestName: String
  rating: Int!
  comment: String
  createdAt: AWSDateTime!
}

type VendorApplication {
  id: ID!
  applicantName: String!
  phone: String!
  email: String
  businessName: String!
  address: String!
  description: String
  hasBankAccount: Boolean!
  whatsappNumber: String
  status: VendorStatus!
  createdAt: AWSDateTime!
}

type PaymentProof {
  id: ID!
  orderId: ID!
  vendorId: ID!
  senderPhone: String!
  senderName: String
  amount: Float
  reference: String
  note: String
  attachmentName: String!
  channel: String!
  status: PaymentProofStatus!
  receivedAt: AWSDateTime!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type RevenueEntry {
  id: ID!
  vendorId: ID!
  orderId: ID
  source: String!
  grossAmount: Float!
  netAmount: Float
  paymentMethod: PaymentMethod
  note: String
  saleDate: AWSDateTime!
  createdBy: ID
  createdAt: AWSDateTime!
}

type InventoryItem {
  id: ID!
  vendorId: ID!
  name: String!
  sku: String
  unit: String
  quantityOnHand: Float!
  reorderLevel: Float
  unitCost: Float
  status: InventoryStatus!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type PaymentInitiation {
  provider: PaymentProvider!
  redirectUrl: String!
  paymentRef: String!
}

type VoiceCallResult {
  status: String!
  callSid: String
}

# ── Input Types ────────────────────────────────────

input RegisterUserInput {
  name: String!
  phone: String!
  email: String
  password: String!
}

input GuestCheckoutInput {
  name: String!
  phone: String!
}

input CreateVendorApplicationInput {
  applicantName: String!
  phone: String!
  email: String
  businessName: String!
  address: String!
  description: String
  hasBankAccount: Boolean!
  whatsappNumber: String
  location: LocationInput
}

input UpdateVendorProfileInput {
  vendorId: ID!
  name: String
  address: String
  location: LocationInput
  contactDetails: String
  workingHours: AWSJSON
  deliveryType: DeliveryType
  deliveryValue: Float
  hasBankAccount: Boolean
  digitalPaymentsEnabled: Boolean
  whatsappNumber: String
  description: String
  imageUrl: String
}

input CreateMenuItemInput {
  vendorId: ID!
  name: String!
  description: String
  price: Float!
  imageUrl: String
  category: String
  available: Boolean
}

input UpdateMenuItemInput {
  menuItemId: ID!
  vendorId: ID!
  name: String
  description: String
  price: Float
  imageUrl: String
  category: String
  available: Boolean
}

input OrderItemInput {
  menuItemId: ID!
  name: String!
  price: Float!
  quantity: Int!
}

input CreateOrderInput {
  customerId: ID
  guestDetails: GuestCheckoutInput
  vendorId: ID!
  deliveryMethod: DeliveryMethod!
  paymentMethod: PaymentMethod!
  contactPhone: String!
  specialInstructions: String
  items: [OrderItemInput!]!
}

input UpdateOrderStatusInput {
  orderId: ID!
  status: OrderStatus!
}

input CreateReviewInput {
  vendorId: ID!
  userId: ID
  guestName: String
  rating: Int!
  comment: String
}

input LocationInput {
  lat: Float!
  lng: Float!
}

input SaveWhatsAppPaymentProofInput {
  orderId: ID!
  vendorId: ID!
  senderPhone: String!
  senderName: String
  amount: Float
  reference: String
  note: String
  attachmentName: String!
  status: PaymentProofStatus
}

input RecordRevenueInput {
  vendorId: ID!
  orderId: ID
  source: String!
  grossAmount: Float!
  netAmount: Float
  paymentMethod: PaymentMethod
  note: String
  saleDate: AWSDateTime
  createdBy: ID
}

input UpsertInventoryItemInput {
  vendorId: ID!
  inventoryItemId: ID
  name: String!
  sku: String
  unit: String
  quantityOnHand: Float!
  reorderLevel: Float
  unitCost: Float
  status: InventoryStatus
}

input BankDetailsInput {
  bankName: String!
  accountNumber: String!
  accountHolder: String!
  branchCode: String!
}

# ── Queries ────────────────────────────────────────

type Query {
  # Vendor queries — public browsing stays on the default (API key) auth
  getNearbyVendors(location: LocationInput!, radiusKm: Float): [Vendor!]!
  getVendor(vendorId: ID!): Vendor
  # Public: customer-facing vendor directory calls this with status=APPROVED
  getAllVendors(status: VendorStatus): [Vendor!]!
  getVendorMenu(vendorId: ID!): [MenuItem!]!
  getVendorByWhatsApp(whatsappNumber: String!): Vendor

  # Bank details are sensitive — owner vendor or admin only, never the public API key
  getVendorBankDetails(vendorId: ID!): BankDetails
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])

  # Order queries
  getOrder(orderId: ID!): Order
  getVendorOrders(vendorId: ID!, status: OrderStatus): [Order!]!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
  getCustomerOrders(customerId: ID!): [Order!]!

  # User queries
  getUser(userId: ID!): User
  getCurrentUser: User

  # Admin queries
  getPendingVendorApplications: [VendorApplication!]!
    @aws_cognito_user_pools(cognito_groups: ["ADMIN", "SUPER_ADMIN"])
  getAllOrders(status: OrderStatus, limit: Int): [Order!]!
    @aws_cognito_user_pools(cognito_groups: ["ADMIN", "SUPER_ADMIN"])

  # Review queries
  getVendorReviews(vendorId: ID!): [Review!]!

  # WhatsApp / payment proof queries
  getOrderPaymentProofs(orderId: ID!): [PaymentProof!]!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])

  # Revenue queries
  getVendorRevenue(vendorId: ID!, fromDate: AWSDateTime, toDate: AWSDateTime): [RevenueEntry!]!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])

  # Inventory queries
  getVendorInventory(vendorId: ID!, status: InventoryStatus): [InventoryItem!]!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
}

# ── Mutations ──────────────────────────────────────

type Mutation {
  # Auth
  registerUser(input: RegisterUserInput!): User!
  guestCheckout(input: GuestCheckoutInput!): User!

  # Vendor lifecycle
  createVendorApplication(input: CreateVendorApplicationInput!): VendorApplication!
  approveVendor(applicationId: ID!): Vendor!
    @aws_cognito_user_pools(cognito_groups: ["ADMIN", "SUPER_ADMIN"])
  rejectVendor(applicationId: ID!, reason: String): VendorApplication!
    @aws_cognito_user_pools(cognito_groups: ["ADMIN", "SUPER_ADMIN"])

  # Vendor management — owner vendor (enforced in-resolver) or admin only
  updateVendorProfile(input: UpdateVendorProfileInput!): Vendor!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
  updateVendorBankDetails(vendorId: ID!, bankDetails: BankDetailsInput!): Vendor!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])

  # Menu management — owner vendor (enforced in-resolver) or admin only
  createMenuItem(input: CreateMenuItemInput!): MenuItem!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
  updateMenuItem(input: UpdateMenuItemInput!): MenuItem!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
  deleteMenuItem(menuItemId: ID!, vendorId: ID!): Boolean!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
  toggleMenuItemAvailability(menuItemId: ID!, vendorId: ID!, available: Boolean!): MenuItem!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])

  # Orders — createOrder/cancelOrder stay public so guests can order/cancel
  createOrder(input: CreateOrderInput!): Order!
  updateOrderStatus(input: UpdateOrderStatusInput!): Order!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
  cancelOrder(orderId: ID!, reason: String): Order!
  markOrderPaid(orderId: ID!): Order!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])

  # Payments — public so guest checkouts can pay; gateway credentials never touch the client
  initiatePayment(orderId: ID!, provider: PaymentProvider!): PaymentInitiation!

  # Masked-caller-ID bridge call from a customer to a vendor — public so
  # guests can use it; Twilio credentials never touch the client
  initiateVoiceCall(vendorId: ID!, customerPhone: String!): VoiceCallResult!

  # Reviews
  createReview(input: CreateReviewInput!): Review!

  # WhatsApp / payment proof tracking
  saveWhatsAppPaymentProof(input: SaveWhatsAppPaymentProofInput!): PaymentProof!

  # Revenue tracking
  recordRevenue(input: RecordRevenueInput!): RevenueEntry!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])

  # Inventory management
  upsertInventoryItem(input: UpsertInventoryItemInput!): InventoryItem!
    @aws_cognito_user_pools(cognito_groups: ["VENDOR", "ADMIN", "SUPER_ADMIN"])
}

# ── Subscriptions ──────────────────────────────────

type Subscription {
  onOrderStatusUpdated(orderId: ID!): Order
    @aws_subscribe(mutations: ["updateOrderStatus"])

  onNewOrderForVendor(vendorId: ID!): Order
    @aws_subscribe(mutations: ["createOrder"])
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
